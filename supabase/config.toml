# Supabase local config (optional). Use when running `supabase start`.
# For production, link with: supabase link --project-ref <ref>

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["https://app.gojolo.io"]

# Google OAuth: configure in Supabase Dashboard (Authentication → Providers) for your linked project.
# For local `supabase start`, add [auth.external.google] with client_id and secret here.

# Edge Function: skip gateway JWT verification; we verify the user inside the function (is_org_admin).
[functions.imap-test-and-save]
verify_jwt = false

# imap-sync: cron calls with x-cron-secret; manual calls with JWT (org admin).
[functions.imap-sync]
verify_jwt = false

# inbox-send-reply: JWT required; org membership checked inside.
[functions.inbox-send-reply]
verify_jwt = false

# ai-chat: JWT verified inside the function via getUser().
[functions.ai-chat]
verify_jwt = false

# imap-flag-sync: sync IMAP flags when threads are closed/trashed/reopened.
[functions.imap-flag-sync]
verify_jwt = false

# imap-idle: near-real-time IMAP IDLE sync. Called by cron every 2 minutes.
[functions.imap-idle]
verify_jwt = false

# imap-fetch-body: lazy-load or force-reload message body + attachments from IMAP (JWT in body for auth).
[functions.imap-fetch-body]
verify_jwt = false

# fetch-thread-bodies: fetches bodies + attachments for all messages in a thread; returns from DB when present, else fetches from IMAP.
[functions.fetch-thread-bodies]
verify_jwt = false

# backfill-empty-bodies: batch IMAP fetch for up to 50 messages with empty body per account (Admin sync).
[functions.backfill-empty-bodies]
verify_jwt = false

# refresh-email: public endpoint to trigger magic-link email for an address; no auth, generic JSON response only.
[functions.refresh-email]
verify_jwt = false

# slack-channels: list channels for project/Admin; requires JWT so gateway accepts request.
[functions.slack-channels]
verify_jwt = false

# slack-events: Slack Events API endpoint (signature verified in function).
[functions.slack-events]
verify_jwt = false

# notify-task-comment: post new task comment to project's Slack channel (called from client with JWT).
[functions.notify-task-comment]
verify_jwt = true

# slack-test-project-channel: send test message to project's linked Slack channel (system uses bot token, no user JWT).
[functions.slack-test-project-channel]
verify_jwt = false

# slack-users: list workspace users for Admin > Slack > User mapping (org scoped via orgId in body).
[functions.slack-users]
verify_jwt = false

# process-user-notification: invoked by DB trigger (pg_net) with x-internal-secret; processes notification_queue and sends Slack DM + Resend email.
[functions.process-user-notification]
verify_jwt = false

# slack-test-dm: send test DM to a Slack user from Admin > User mapping (verify bot can message users).
[functions.slack-test-dm]
verify_jwt = false

# sync-profile-avatar: sync OAuth avatar image into Supabase Storage.
[functions.sync-profile-avatar]
verify_jwt = false

# process-pending-notifications: org admin triggers processing of queued notifications (e.g. after setting app_config).
[functions.process-pending-notifications]
verify_jwt = true
