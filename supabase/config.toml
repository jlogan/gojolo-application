# Supabase local config (optional). Use when running `supabase start`.
# For production, link with: supabase link --project-ref <ref>

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["https://app.gojolo.io"]

# Google OAuth: configure in Supabase Dashboard (Authentication → Providers) for your linked project.
# For local `supabase start`, add [auth.external.google] with client_id and secret here.

# Edge Function: skip gateway JWT verification; we verify the user inside the function (is_org_admin).
[functions.imap-test-and-save]
verify_jwt = false

# imap-sync: cron calls with x-cron-secret; manual calls with JWT (org admin).
[functions.imap-sync]
verify_jwt = false

# inbox-send-reply: JWT required; org membership checked inside.
[functions.inbox-send-reply]
verify_jwt = false

# ai-chat: JWT verified inside the function via getUser().
[functions.ai-chat]
verify_jwt = false

# imap-flag-sync: sync IMAP flags when threads are closed/trashed/reopened.
[functions.imap-flag-sync]
verify_jwt = false

# imap-idle: near-real-time IMAP IDLE sync. Called by cron every 2 minutes.
[functions.imap-idle]
verify_jwt = false

# imap-fetch-body: lazy-load email body on demand when user opens a thread.
[functions.imap-fetch-body]
verify_jwt = false

# fetch-thread-bodies: fetches bodies + attachments for all messages in a thread; returns from DB when present, else fetches from IMAP.
[functions.fetch-thread-bodies]
verify_jwt = false

# refresh-email: public endpoint to trigger magic-link email for an address; no auth, generic JSON response only.
[functions.refresh-email]
verify_jwt = false
